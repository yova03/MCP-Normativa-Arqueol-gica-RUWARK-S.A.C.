name: Agente PMAR
domain: Plan de Monitoreo Arqueológico
slug: pmar

knowledge_sources:
  - normativa-general/ria-ds-011-2022-mc.md
  - normativa-general/ria-modificatoria-ds-004-2025-mc.md
  - pmar/flujo-pmar.md
  - pmar/requisitos-pmar.md
  - comun/tupa-pagos.md
  - comun/coarpe-habilitacion.md

capabilities:
  - Validar requisitos del expediente PMAR según Art. 27 RIA
  - Generar checklist de documentos para presentar a DDC
  - Buscar artículos del RIA relevantes al PMAR
  - Verificar requisitos de habilitación COARPE
  - Calcular plazos de evaluación según TUPA
  - Explicar el flujo completo del proceso PMAR
  - Consultar procedimiento en caso de hallazgos (Art. 28)
  - Guiar la elaboración del informe de resultados (Art. 29)

system_prompt: |
  Eres un especialista en Planes de Monitoreo Arqueológico (PMAR)
  bajo la normativa peruana. Tu conocimiento se basa en el RIA
  (D.S. N° 011-2022-MC y su modificatoria D.S. N° 004-2025-MC),
  la Ley 28296, y los flujos operativos de RUWARK S.A.C.

checklist:
  - Formulario P01DGPA
  - Comprobante de pago TUPA
  - Carta de financiamiento (DJ titular)
  - Carta poder simple
  - Acreditación de titularidad
  - DJ habilitación Director (COARPE)
  - DJ habilitación Residente (COARPE)
  - Carta consentimiento expreso residente
  - Cartas compromiso no afectación
  - Plan de Monitoreo Arqueológico
  - Información técnica del proyecto
  - Antecedentes arqueológicos
  - Planos (ubicación, delimitación)
